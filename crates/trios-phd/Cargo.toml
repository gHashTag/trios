[package]
name = "trios-phd"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "PhD monograph build, audit, bibliography, Coq-citation, and reproducibility pipeline (R1: Rust-only, no .py / .sh)"

[[bin]]
name = "trios-phd"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
walkdir = "2.5"
# Optional dependencies for the `render` subcommand.
# `neon` enables direct Neon Postgres pulls (tokio-postgres).
# `http` enables in-process asset downloads via reqwest. Without these
# features the same code paths shell out to `curl` / use a cached
# `chapters.json`, keeping the crate buildable without extra deps.
tokio = { workspace = true, optional = true }
tokio-postgres = { version = "0.7", optional = true }
reqwest = { version = "0.12", features = ["blocking"], optional = true }

[features]
default = []
neon = ["tokio", "tokio-postgres"]
http = ["reqwest"]

[dev-dependencies]
tempfile = { workspace = true }

[[bin]]
name = "defense_gate"
path = "src/bin/defense_gate.rs"
