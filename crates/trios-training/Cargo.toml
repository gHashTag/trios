[package]
name = "trios-training"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
precision-router = { path = "../precision-router" }
trios-golden-float = { path = "../trios-golden-float" }
trios-tri = { path = "../trios-tri" }
burn = { version = "0.16", optional = true, features = ["ndarray"] }

[features]
burn-backend = ["dep:burn"]

[[example]]
name = "multilayer_train"
required-features = ["burn-backend"]
