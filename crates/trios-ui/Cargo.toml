[package]
name = "trios-ui"
version = "0.1.0"
edition = "2021"
authors = ["Dmitrii Vasilev"]
license = "MIT"
repository = "https://github.com/gHashTag/trios"
description = "TRIOS UI — Dioxus + Jotai-style state (Ring Isolation architecture)"
publish = false

[workspace]
members = [
    "rings/UR-00",
    "rings/UR-01",
    "rings/UR-02",
    "rings/UR-03",
    "rings/UR-04",
    "rings/UR-05",
    "rings/UR-06",
    "rings/UR-07",
    "rings/UR-08",
    "rings/BR-APP",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Dmitrii Vasilev"]
license = "MIT"
repository = "https://github.com/gHashTag/trios"

[workspace.dependencies]
dioxus = { version = "0.6", features = ["html"] }
dioxus-signals = "0.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
wasm-logger = "0.2"
console_error_panic_hook = "0.1"
wasm-bindgen = "0.2.118"

[dependencies]
trios-ui-ur00 = { path = "rings/UR-00" }
trios-ui-ur01 = { path = "rings/UR-01" }
trios-ui-ur02 = { path = "rings/UR-02" }
trios-ui-ur03 = { path = "rings/UR-03" }
trios-ui-ur04 = { path = "rings/UR-04" }
trios-ui-ur05 = { path = "rings/UR-05" }
trios-ui-ur06 = { path = "rings/UR-06" }
trios-ui-ur07 = { path = "rings/UR-07" }
trios-ui-ur08 = { path = "rings/UR-08" }
