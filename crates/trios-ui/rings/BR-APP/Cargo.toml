[package]
name = "trios-ui-br-app"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "BR-APP — WASM Entry Point (wires all UI rings)"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
dioxus = { workspace = true }
console_error_panic_hook = { workspace = true }
wasm-logger = { workspace = true }
wasm-bindgen = { workspace = true }
log = { workspace = true }
trios-ui-ur00 = { path = "../UR-00" }
trios-ui-ur01 = { path = "../UR-01" }
trios-ui-ur02 = { path = "../UR-02" }
trios-ui-ur03 = { path = "../UR-03" }
trios-ui-ur04 = { path = "../UR-04" }
trios-ui-ur05 = { path = "../UR-05" }
trios-ui-ur06 = { path = "../UR-06" }
trios-ui-ur07 = { path = "../UR-07" }
trios-ui-ur08 = { path = "../UR-08" }

[dev-dependencies]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 4
