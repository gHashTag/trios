[package]
name = "trios-ui-ring-ur00"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "UR-00 — WASM entry point for trios-ui Dioxus sidebar"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
trios-ui-ring-ur07 = { path = "../UR-07" }
trios-ui-ring-ur08 = { path = "../UR-08" }
dioxus = { version = "0.6", features = ["web"] }
wasm-bindgen = "0.2.92"
web-sys = { version = "0.3.69", features = [
    "Window", "Document", "Element", "HtmlElement", "HtmlInputElement",
    "Event", "EventTarget", "KeyboardEvent",
    "console",
] }
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
wasm-logger = "0.2"
console_error_panic_hook = "0.1"
