[package]
name = "trios-vsa"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/gHashTag/trios"
description = "Vector Symbolic Architecture — VSA operations for Trinity"

[lib]
name = "trios_vsa"
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
libc = "0.2"
trios-core = { path = "../trios-core" }

[build-dependencies]
cc = "1.0"
