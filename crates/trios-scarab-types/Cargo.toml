[package]
name = "trios-scarab-types"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "TRIOS SCARAB TYPES — parallel-execution foundation: 5 atomic rings (SR-00..SR-04) typing the Term/Lane/Soul/Gate scarabs used by trinity-bootstrap"
publish = false

[workspace]
members = [
    "rings/SR-00",
    "rings/SR-01",
    "rings/SR-02",
    "rings/SR-03",
    "rings/SR-04",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Dmitrii Vasilev"]
license = "MIT"
repository = "https://github.com/gHashTag/trios"

[dependencies]
trios-scarab-types-sr-00 = { path = "rings/SR-00" }
trios-scarab-types-sr-01 = { path = "rings/SR-01" }
trios-scarab-types-sr-02 = { path = "rings/SR-02" }
trios-scarab-types-sr-03 = { path = "rings/SR-03" }
trios-scarab-types-sr-04 = { path = "rings/SR-04" }

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
