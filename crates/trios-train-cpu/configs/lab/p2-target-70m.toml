# P2 Lab Config: 70M Target (Gate-2 candidate)
# Uses lr_star from 8M proxy (no LR sweep here)
# d=384, 4L for Gate-2 target

[model]
d_model = 384  # Same as 24M, more layers
n_layers = 4
n_heads = 6
vocab_size = 32000
max_seq_len = 512

[training]
lr = 0.0039  # lr_star from 8M proxy
warmup_steps = 500
max_steps = 12000
batch_size = 32
seq_len = 512
grad_clip = 1.0

[optimizer]
kind = "muon"
eta_2d = 0.0235
eta_1d = 0.007
momentum = 0.95
weight_decay = 0.0
ns_steps = 7

[mup]
ref_width = 256
target_width = 384
enable_mup = true

[data]
train_path = "/data/fineweb_train.bin"
val_path = "/data/fineweb_val.bin"
val_interval = 500

[lab]
phase = "p2"
purpose = "mup_transfer"
seed = 43
width_name = "70m"
gate2_candidate = true
lab_only = true
