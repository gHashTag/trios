# P2 Lab Config: 8M Proxy (LR sweep base)
# Hypothesis: lr_star at 8M transfers to 24M/70M with <=5% degradation

[model]
d_model = 256  # 8M proxy
n_layers = 2
n_heads = 4
vocab_size = 32000
max_seq_len = 512

[training]
# LR sweep point: will be overridden by sweep script
lr = 0.0039
warmup_steps = 500
max_steps = 12000
batch_size = 32
seq_len = 512
grad_clip = 1.0

[optimizer]
kind = "muon"  # P1 winner assumption
eta_2d = 0.0235
eta_1d = 0.007
momentum = 0.95
weight_decay = 0.0
ns_steps = 7

[mup]
ref_width = 256
target_width = 256
enable_mup = false  # Base proxy, no muP scaling needed

[data]
train_path = "/data/fineweb_train.bin"
val_path = "/data/fineweb_val.bin"
val_interval = 500

[lab]
phase = "p2"
purpose = "mup_proxy_sweep"
seed = 43
width_name = "8m"
lab_only = true
