[package]
name = "trios-train-cpu"
version = "0.1.0"
edition = "2021"
license = "MIT"

[dependencies]
anyhow = "1.0"
trios-core = { path = "../trios-core" }
trios-physics = { path = "../trios-physics" }
trios-phi-schedule = { path = "../trios-phi-schedule" }
trios-data = { path = "../trios-data" }
trios-ternary = { path = "../trios-ternary" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.8"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
criterion = "0.5"
