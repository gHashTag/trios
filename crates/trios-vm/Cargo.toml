[package]
name = "trios-vm"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/gHashTag/trios"
description = "Ternary Virtual Machine — JIT + Sacred Opcodes"

[lib]
name = "trios_vm"
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
libc = "0.2"
trios-vsa = { path = "../trios-vsa" }
trios-hybrid = { path = "../trios-hybrid" }

[build-dependencies]
cc = "1.0"
