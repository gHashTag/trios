[package]
name = "trios-ext-ring-ex03"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "SILVER-RING-EXT-03 — Comet bridge and typed message envelopes for Trios Chrome Extension"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
trios-ext-ring-ex01 = { path = "../SILVER-RING-EXT-01" }
wasm-bindgen = "0.2.92"
web-sys = { version = "0.3.69", features = [
    "Window", "Document", "Element",
    "WebSocket", "MessageEvent", "CloseEvent", "ErrorEvent",
    "console",
] }
js-sys = "0.3"
serde = { workspace = true }
serde_json = { workspace = true }
log = "0.4"

[dev-dependencies]
wasm-bindgen-test = "0.3"
