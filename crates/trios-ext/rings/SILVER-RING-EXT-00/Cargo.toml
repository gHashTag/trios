[package]
name = "trios-ext-ring-ex00"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "SILVER-RING-EXT-00 — WASM entry point for Trios Chrome Extension"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
trios-ext-ring-ex01 = { path = "../SILVER-RING-EXT-01" }
trios-ext-ring-ex02 = { path = "../SILVER-RING-EXT-02" }
trios-ext-ring-ex03 = { path = "../SILVER-RING-EXT-03" }
wasm-bindgen = "0.2.92"
web-sys = { version = "0.3.69", features = [
    "Window", "Document", "Element", "HtmlElement", "HtmlInputElement",
    "Event", "EventTarget", "KeyboardEvent",
    "console",
] }
js-sys = "0.3"
log = "0.4"
console_error_panic_hook = "0.1"
