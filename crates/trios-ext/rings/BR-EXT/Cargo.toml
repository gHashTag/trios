[package]
name = "trios-ext-br"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "BR-EXT — WASM Entry Point (wires all EXT rings)"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = { workspace = true }
console_error_panic_hook = { workspace = true }
wasm-logger = { workspace = true }
log = { workspace = true }
trios-ext-00 = { path = "../EXT-00" }
trios-ext-01 = { path = "../EXT-01" }
trios-ext-02 = { path = "../EXT-02" }
trios-ext-03 = { path = "../EXT-03" }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 4
