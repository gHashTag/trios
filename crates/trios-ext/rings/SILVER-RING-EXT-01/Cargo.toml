[package]
name = "trios-ext-ring-ex01"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "SILVER-RING-EXT-01 — DOM bridge for Trios Chrome Extension"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2.92"
web-sys = { version = "0.3.69", features = [
    "Window", "Document", "Element", "HtmlElement", "HtmlInputElement",
    "HtmlCollection", "NodeList", "DomTokenList",
    "Event", "EventTarget", "KeyboardEvent",
    "console",
] }
js-sys = "0.3"
log = "0.4"
