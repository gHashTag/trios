[package]
name = "trios-ext-ext04"
version = "0.1.0"
edition = "2021"
authors = ["Dmitrii Vasilev"]
license = "MIT"
description = "EXT-04: BrowserOS A2A agent — browser tab control, DOM, navigation via MCP tools"

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "Element",
    "HtmlElement",
    "HtmlInputElement",
    "HtmlTextAreaElement",
    "Node",
    "NodeList",
    "Location",
    "Navigator",
    "Clipboard",
    "Event",
    "KeyboardEvent",
    "MouseEvent",
    "ScrollToOptions",
] }
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
console_log = "1"
