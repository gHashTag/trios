<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Trinity Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a2e;
      padding: 16px;
      width: 320px;
    }
    h2 {
      font-size: 15px;
      font-weight: 600;
      color: #c9a84c;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    .field { margin-bottom: 12px; }
    label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #0d0d1a;
      color: #e0e0e0;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #c9a84c; }
    .row { display: flex; gap: 8px; align-items: center; }
    .row input { flex: 1; }
    button {
      padding: 6px 12px;
      border: 1px solid #c9a84c;
      border-radius: 6px;
      background: transparent;
      color: #c9a84c;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    button:hover { background: #c9a84c; color: #1a1a2e; }
    .status {
      font-size: 11px;
      margin-top: 4px;
      min-height: 16px;
      transition: opacity 0.3s;
    }
    .status.saved { color: #4caf50; }
    .status.error { color: #f44336; }
    .divider {
      border: none;
      border-top: 1px solid #2a2a3e;
      margin: 16px 0;
    }
    .footer {
      font-size: 10px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Trinity Agent Bridge</h2>

  <div class="field">
    <label for="zai-key">ZAI API Key</label>
    <div class="row">
      <input type="password" id="zai-key" placeholder="zai-..." autocomplete="off"/>
      <button id="toggle-zai">Show</button>
    </div>
    <div class="status" id="zai-status"></div>
  </div>

  <div class="field">
    <label for="zai-base">ZAI Base URL (optional)</label>
    <input type="text" id="zai-base" placeholder="https://api.z.ai" autocomplete="off"/>
    <div class="status" id="zai-base-status"></div>
  </div>

  <hr class="divider"/>

  <div class="field">
    <label for="mcp-url">MCP Server URL</label>
    <input type="text" id="mcp-url" placeholder="http://127.0.0.1:9105" autocomplete="off"/>
    <div class="status" id="mcp-status"></div>
  </div>

  <hr class="divider"/>
  <div class="footer">phi^2 + phi^-2 = 3 | TRINITY</div>

  <script src="settings.js"></script>
</body>
</html>
