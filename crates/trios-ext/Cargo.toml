[package]
name = "trios-ext"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Trios Chrome Extension (Dioxus/Wasm)"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["Window", "Document", "Element", "HtmlElement", "WebSocket", "MessageEvent", "console"] }
js-sys = "0.3"
serde = { workspace = true }
serde_json = { workspace = true }
