[package]
name = "trios-sdk"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/gHashTag/trios"
description = "High-level SDK for Trinity — Hypervector, Codebook, AssociativeMemory"

[lib]
name = "trios_sdk"
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
libc = "0.2"
trios-vm = { path = "../trios-vm" }
trios-vsa = { path = "../trios-vsa" }
