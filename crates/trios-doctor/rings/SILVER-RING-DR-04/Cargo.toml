[package]
name = "trios-doctor-dr04"
version = "0.1.0"
edition = "2021"
authors = ["Dmitrii Vasilev"]
license = "MIT"
description = "SILVER-RING-DR-04: ring-architecture lint rules (R-RING-FACADE-001 .. R-COQ-LINK-008) for trios-doctor"
publish = false

[lib]
name = "trios_doctor_dr04"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
chrono = { version = "0.4", features = ["serde"] }
walkdir = "2"
thiserror = "1"

[dev-dependencies]
tempfile = "3"
