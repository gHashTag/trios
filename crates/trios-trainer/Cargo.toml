[package]
name = "trios-trainer"
version = "0.1.0"
edition = "2021"
description = "Single source of truth for IGLA training — any machine, any VPS, Railway"
license = "MIT"
repository = "https://github.com/gHashTag/trios"

[[bin]]
name = "trios-train"
path = "src/bin/trios-train.rs"

[dependencies]
# Core
tokio = { version = "1.35", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
clap = { version = "4.4", features = ["derive"] }
anyhow = "1.0"
thiserror = "1.0"

# ML (will migrate from trios-train-cpu)
# trios-golden-float = { path = "../trios-golden-float" }

# IGLA race integration (keep as dep for invariants)
# trios-igla-race = { path = "../trios-igla-race" }

[dev-dependencies]
