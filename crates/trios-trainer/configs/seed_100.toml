[training]
steps = 4000
batch_size = 64
checkpoint_interval = 1000
eval_interval = 500
train_path = "/data/fineweb_train.bin"
val_path = "/data/fineweb_val.bin"

[model]
d_model = 256
n_layers = 2
n_heads = 4
vocab_size = 32000
seq_len = 1024
hybrid_attn = false

[optimizer]
kind = "adamw"
lr = 0.004
beta1 = 0.9
beta2 = 0.95
weight_decay = 0.04
schedule = "phi"
warmup_steps = 500

[data]
corpus = "fineweb"
