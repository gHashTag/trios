[workspace]
members = [
    "crates/trios-core",
    "crates/trios-git",
    "crates/trios-gb",
    "crates/trios-server",
    "crates/trios-kg",
    "crates/trios-agents",
    "crates/trios-training",
    "crates/trios-hdc",
    "crates/trios-golden-float",
    "crates/trios-physics",
    "crates/trios-sacred",
    "crates/trios-crypto",
    "crates/trios-zig-agents",
    "crates/trios-claraParameter",
]

resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["gHashTag <playra@gmail.com>"]
license = "MIT"
repository = "https://github.com/gHashTag/trios"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
axum = "0.7"
git2 = "0.19"
async-trait = "0.1"
tempfile = "3"
thiserror = "1"
