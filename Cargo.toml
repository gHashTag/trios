[workspace]
members = [
    # Core (Φ0)
    "crates/trios-core",
    "crates/precision-router",
    # GF16 (Φ2)
    "crates/trios-golden-float",
    # Ternary (Φ3)
    "crates/trios-ternary",
    # Hybrid (Φ4)
    "crates/trios-hybrid",
    # Training (Φ5)
    "crates/trios-training",
    # Git & MCP infrastructure
    "crates/trios-git",
    "crates/trios-gb",
    "crates/trios-server",
    "crates/trios-kg",
    # Agents & Training
    "crates/trios-agents",
    "crates/trios-training-ffi",
    # Other modules
    "crates/trios-hdc",
    "crates/trios-physics",
    "crates/trios-sacred",
    "crates/trios-crypto",
    "crates/trios-zig-agents",
    "crates/zig-agents",
]

