[package]
name = "merge-order-gate"
version = "0.1.0"
edition = "2021"
publish = false
description = "Phase A merge-order witness — enforces that Phase A prerequisites merge before chapter PRs (trios#265 §5)"
license = "MIT OR Apache-2.0"

# R1: Rust only. R3: lands on main. R6: tools/merge_order_gate is greenfield.
# Witness contract: exit 0 iff every regulated chapter PR merged into `main`
# has *all* pre-registered Phase A prerequisite PRs merged at an earlier
# first-parent index. Exit codes 90..=93 (disjoint from L7=0..=10,
# L15=21..=30, L-h4=50..=53, LT=60..=63, LA=70..=74, citetheorem_audit=80..=83).

[[bin]]
name = "merge-order-gate"
path = "src/main.rs"

[lib]
name = "merge_order_gate"
path = "src/lib.rs"

[dependencies]
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
