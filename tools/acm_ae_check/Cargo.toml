[package]
name = "acm-ae-check"
version = "0.1.0"
edition = "2021"
publish = false
description = "LA ACM AE 3-badge witness — Phase D for the «Flos Aureus» PhD monograph (trios#265)"
license = "MIT OR Apache-2.0"

# R1: Rust only. R3: lands on main. R6: tools/acm_ae_check is greenfield.
# Witness contract: exit 0 iff Functional + Reusable + Available all PASS
# AND artifact/output.txt matches artifact/expected.txt byte-for-byte.

[[bin]]
name = "acm-ae-check"
path = "src/main.rs"

[lib]
name = "acm_ae_check"
path = "src/lib.rs"

[dependencies]
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
