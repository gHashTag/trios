name: Laws Guard

on:
  push:
    branches: [main, dev, feat/*, fix/*, bee/*]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  constitutional-check:
    name: Constitutional Enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check LAWS.md exists
        run: |
          if [ ! -f LAWS.md ]; then
            echo "CONSTITUTIONAL BREACH: LAWS.md missing"
            exit 1
          fi
          echo "LAWS.md exists"

      - name: Check SUPREMACY CLAUSE present
        run: |
          if ! grep -q "SUPREMACY" LAWS.md; then
            echo "BREACH: SUPREMACY clause missing"
            exit 1
          fi
          echo "SUPREMACY clause present"

      - name: Check schema version
        run: |
          if ! grep -q "LAWS_SCHEMA_VERSION" LAWS.md; then
            echo "BREACH: LAWS_SCHEMA_VERSION missing"
            exit 1
          fi
          echo "LAWS_SCHEMA_VERSION present"

      - name: L1 - No .sh files
        run: |
          COUNT=$(find . -name "*.sh" ! -path "*/node_modules/*" ! -path "*/.git/*" ! -path "*/target/*" | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            echo "L1 VIOLATION: $COUNT shell scripts found"
            find . -name "*.sh" ! -path "*/node_modules/*" ! -path "*/.git/*" ! -path "*/target/*"
            exit 1
          fi
          echo "L1: No .sh files"

      - name: L2 - PR closes issue
        if: github.event_name == 'pull_request'
        run: |
          if ! echo "${{ github.event.pull_request.body }}" | grep -iE "(Closes|Fixes|Resolves) #[0-9]+"; then
            echo "L2 VIOLATION: No 'Closes #N' in PR body"
            exit 1
          fi
          echo "L2: PR closes an issue"

      - name: I5 - No /extension root directory
        run: |
          if [ -d "./extension" ]; then
            echo "VIOLATION: /extension root exists, use crates/trios-ext/extension/"
            exit 1
          fi
          echo "I5: No /extension root directory"

      - name: agent-dispatch prompt must exist
        run: |
          if [ ! -f .trinity/prompts/agent-dispatch.md ]; then
            echo "VIOLATION: .trinity/prompts/agent-dispatch.md missing"
            exit 1
          fi
          echo "agent-dispatch.md exists"
