# COQ INVARIANT CI GATE — L-R14
# Blocks merge if any Coq invariant proof fails to compile
# Trinity: φ² + φ⁻² = 3 | IGLA-INV-001..005
# Source: trinity-clara/proofs/*.v

name: Coq Invariant Check (L-R14)

on:
  push:
    branches: [main]
    paths:
      - 'trinity-clara/proofs/**'
      - 'assertions/igla_assertions.json'
      - 'crates/trios-igla-race/src/invariants.rs'
      - '.github/workflows/coq-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'trinity-clara/proofs/**'
      - 'assertions/igla_assertions.json'
      - 'crates/trios-igla-race/src/invariants.rs'
      - '.github/workflows/coq-check.yml'

jobs:
  coq-invariants:
    name: Verify IGLA-INV-001..005
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Coq + coq-interval
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y coq
          # coq-interval for numeric inequalities (Interval.Tactic)
          opam init --bare --no-setup
          opam switch create igla ocaml-base-compiler.4.14.1
          eval $(opam env)
          opam repo add coq-released https://coq.inria.fr/opam/released
          opam install -y coq-interval

      - name: Check INV-5 (Proven — Lucas closure)
        run: |
          eval $(opam env)
          if [ -f trinity-clara/proofs/lucas_closure_gf16.v ]; then
            coqc trinity-clara/proofs/lucas_closure_gf16.v
            echo "✅ INV-5 lucas_closure_gf16: PROVEN"
          else
            echo "⏳ INV-5 proof file not yet created — BLOCKING"
            exit 1
          fi

      - name: Check INV-2 (Admitted — asha_champion_survives)
        run: |
          eval $(opam env)
          if [ -f trinity-clara/proofs/igla_asha_bound.v ]; then
            coqc trinity-clara/proofs/igla_asha_bound.v
            echo "✅ INV-2 igla_asha_bound: compiles (Admitted)"
          else
            echo "❌ INV-2 proof file missing — create trinity-clara/proofs/igla_asha_bound.v"
            exit 1
          fi

      - name: Check INV-3 (Admitted — gf16_safe_domain)
        run: |
          eval $(opam env)
          if [ -f trinity-clara/proofs/gf16_precision.v ]; then
            coqc trinity-clara/proofs/gf16_precision.v
            echo "✅ INV-3 gf16_precision: compiles (Admitted)"
          else
            echo "❌ INV-3 proof file missing — create trinity-clara/proofs/gf16_precision.v"
            exit 1
          fi

      - name: Check INV-4 (Admitted — nca_entropy_stability)
        run: |
          eval $(opam env)
          if [ -f trinity-clara/proofs/nca_entropy_band.v ]; then
            coqc trinity-clara/proofs/nca_entropy_band.v
            echo "✅ INV-4 nca_entropy_band: compiles (Admitted)"
          else
            echo "❌ INV-4 proof file missing — create trinity-clara/proofs/nca_entropy_band.v"
            exit 1
          fi

      - name: Check INV-1 (Admitted — bpb_decreases_with_real_gradient)
        run: |
          eval $(opam env)
          if [ -f trinity-clara/proofs/lr_phi_optimality.v ]; then
            coqc trinity-clara/proofs/lr_phi_optimality.v
            echo "✅ INV-1 lr_phi_optimality: compiles (Admitted)"
          else
            echo "⚠️  INV-1 proof file missing — warn only (non-critical path)"
          fi

      - name: Validate assertions/igla_assertions.json (schema + L-R14)
        run: |
          cat > /tmp/validate_assertions.py <<'PYEOF'
          import json, re, sys
          with open('assertions/igla_assertions.json') as f:
              data = json.load(f)
          # --- Top-level shape ---
          assert isinstance(data, dict), 'root must be object'
          assert data.get('trinity_identity') == 'φ² + φ⁻² = 3', 'trinity_identity must be φ² + φ⁻² = 3'
          assert isinstance(data.get('invariants'), list), 'invariants must be list'
          assert len(data['invariants']) >= 5, f'Expected >=5 invariants, got {len(data["invariants"])}'
          # --- Per-invariant required fields ---
          required = {'id', 'name', 'coq_theorem', 'coq_file', 'status'}
          seen_ids = set()
          for inv in data['invariants']:
              missing = required - set(inv.keys())
              assert not missing, f'invariant {inv.get("id","?")} missing fields: {missing}'
              assert inv['status'] in ('Proven', 'Admitted'), f'{inv["id"]}: invalid status {inv["status"]}'
              assert re.match(r'^INV-[1-9][0-9]?$', inv['id']), f'bad invariant id: {inv["id"]}'
              seen_ids.add(inv['id'])
          # --- INV-1..INV-5 must all be present ---
          for i in range(1, 6):
              assert f'INV-{i}' in seen_ids, f'INV-{i} missing'
          # --- Admitted budget honesty ---
          budget = data.get('_metadata', {}).get('admitted_budget', {})
          if budget:
              assert budget.get('used', 0) <= budget.get('max', 4), 'Admitted budget exceeded'
          print(f'OK igla_assertions.json schema valid: {len(data["invariants"])} invariants, ids={sorted(seen_ids)}')
          PYEOF
          python3 /tmp/validate_assertions.py

      - name: Run Rust invariant tests (BLOCKING gate)
        run: |
          # L-R14: every numeric constant in invariants.rs must trace to JSON.
          # If this fails the proof↔runtime bridge is broken — block merge.
          cargo test -p trios-igla-race --lib -- invariants --nocapture

      - name: Run Rust clippy on igla-race (non-blocking, hygiene signal)
        continue-on-error: true
        run: |
          cargo clippy -p trios-igla-race --lib --tests -- -D warnings

      - name: Summary
        if: always()
        run: |
          echo "## 🧮 Coq Invariant Gate — L-R14" >> $GITHUB_STEP_SUMMARY
          echo "| Invariant | Theorem | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| INV-1 | bpb_decreases_with_real_gradient | Admitted |" >> $GITHUB_STEP_SUMMARY
          echo "| INV-2 | asha_champion_survives | Admitted (BLOCKING) |" >> $GITHUB_STEP_SUMMARY
          echo "| INV-3 | gf16_safe_domain | Admitted (BLOCKING) |" >> $GITHUB_STEP_SUMMARY
          echo "| INV-4 | nca_entropy_stability | Admitted (BLOCKING) |" >> $GITHUB_STEP_SUMMARY
          echo "| INV-5 | lucas_closure_gf16 | Proven (BLOCKING) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "φ² + φ⁻² = 3 | TRINITY | IGLA RACE v2" >> $GITHUB_STEP_SUMMARY
