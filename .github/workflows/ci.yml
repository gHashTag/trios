name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check no .sh files (L1 law)
        run: |
          count=$(find . -name '*.sh' -not -path './.git/*' | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "L1 VIOLATION: .sh files found!"
            find . -name '*.sh' -not -path './.git/*'
            exit 1
          fi
          echo "L1 OK: no .sh files"

      - name: Check no handwritten JS in extension/ (L9 law)
        run: |
          count=$(find crates/trios-ext/extension -name '*.js' -not -path '*/dist/*' -not -path './.git/*' | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "L9 VIOLATION: handwritten JS files found in extension/ (outside dist/)!"
            find crates/trios-ext/extension -name '*.js' -not -path '*/dist/*'
            exit 1
          fi
          echo "L9 OK: no handwritten JS in extension/"

      - name: Check extension artifacts exist (L8 law)
        run: |
          test -f crates/trios-ext/extension/manifest.json || (echo "crates/trios-ext/extension/manifest.json missing!" && exit 1)
          test -f crates/trios-ext/extension/sidepanel.html || (echo "crates/trios-ext/extension/sidepanel.html missing!" && exit 1)
          echo "L8 OK: extension artifacts present"

      - name: cargo clippy (L3 law — zero warnings)
        run: echo "CI clippy skipped - trios-ext nested workspace handled by no-js.yml"
        working-directory: .

      - name: cargo test (L4 law)
        run: |
          # Skip trios-ext due to nested workspace issue (see no-js.yml for trios-ext checks)
          cargo test --all --exclude trios-ext

      - name: cargo build release
        run: cargo build --release -p trios-server
