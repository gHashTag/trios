name: Task Contract
description: Standard task issue following LAWS.md § 5 schema
title: "[TYPE] Short imperative title (≤72 chars)"
labels: ["needs-triage"]
body:
  - type: dropdown
    id: classification
    attributes:
      label: Classification
      options:
        - P0-CRITICAL
        - P1-HIGH
        - P2-MEDIUM
        - P3-LONG-TERM
    validations:
      required: true

  - type: dropdown
    id: kingdom
    attributes:
      label: Kingdom (domain)
      options:
        - Rust
        - Test
        - Lint
        - Network
        - Structure
        - Surface
        - Security
        - Protocol
        - Identity
        - Cross-kingdom
    validations:
      required: true

  - type: input
    id: soul_name
    attributes:
      label: Soul-Name
      description: Humorous English name for the agent (per L11)
      placeholder: "e.g., Justice League, Speed Racer, Doc Ock"
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What success looks like
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: Explicit scope boundary (what we're NOT doing)
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Measurable, testable criteria. Each line = one test.
      placeholder: |
        - [ ] cargo clippy = 0
        - [ ] test X passes
        - [ ] evidence in .trinity/experience/
    validations:
      required: true

  - type: textarea
    id: evidence_required
    attributes:
      label: Evidence to produce
      description: What artifacts this task will produce
    validations:
      required: true

  - type: input
    id: closes
    attributes:
      label: Closes / Blocks / Relates to
      placeholder: "Closes #N, Blocks #M, Relates #K"

  - type: input
    id: deadline
    attributes:
      label: Deadline
      description: ISO 8601 date or milestone (optional)
      placeholder: "2026-04-30"
