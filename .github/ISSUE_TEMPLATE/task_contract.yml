name: Task Contract
description: Standard task issue following LAWS.md PHI LOOP schema
title: "[TYPE] Short imperative title (≤72 chars)"
labels: ["needs-triage"]
body:
  - type: dropdown
    id: classification
    attributes:
      label: Priority
      options: [P0-CRITICAL, P1-HIGH, P2-MEDIUM, P3-LONG-TERM]
    validations:
      required: true

  - type: dropdown
    id: kingdom
    attributes:
      label: Kingdom (domain)
      options: [Rust, Test, Lint, Network, Structure, UI, Security, Protocol, Identity, Cross-kingdom]
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: One sentence — what problem does this solve?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Checkboxes — what must be true for this to be DONE?
      placeholder: |
        - [ ] criterion 1
        - [ ] criterion 2
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-Goals
      description: What is explicitly OUT of scope?

  - type: textarea
    id: references
    attributes:
      label: References
      description: Related issues, PRs, files
