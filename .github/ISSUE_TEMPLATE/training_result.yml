name: Training Result
description: Report a new CPU/GPU BPB training record
title: "[TRAIN] Model: {{arch}} BPB: {{value}} seeds: {{seeds}}"
labels: ["training", "P2-MEDIUM"]
body:
  - type: input
    id: model
    attributes:
      label: Model Architecture
      placeholder: "4-gram + ReLU h=128"
    validations:
      required: true

  - type: input
    id: bpb
    attributes:
      label: BPB (bits per byte)
      placeholder: "2.780"
    validations:
      required: true

  - type: input
    id: seeds
    attributes:
      label: Seeds
      placeholder: "42, 43, 44"
    validations:
      required: true

  - type: textarea
    id: hyperparams
    attributes:
      label: Hyperparameters
      placeholder: |
        hidden: 128
        lr: 0.004
        steps: 12000
    validations:
      required: true

  - type: textarea
    id: what_worked
    attributes:
      label: What worked / What changed
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit SHA
    validations:
      required: true
