name: Constitutional Amendment
description: Propose a change to LAWS.md — requires human maintainer approval
title: "[AMEND] Short description of proposed law change"
labels: ["constitutional-amendment", "P0-CRITICAL"]
body:
  - type: markdown
    attributes:
      value: |
        ## ⚖️ Constitutional Amendment
        Changes to LAWS.md require:
        1. This issue with full justification
        2. PR with `Closes #N` in body
        3. Human maintainer (@gHashTag) approval
        4. LAWS_HASH update in `.trinity/state/LAWS_HASH`

  - type: textarea
    id: current_law
    attributes:
      label: Current Law (quote exactly)
    validations:
      required: true

  - type: textarea
    id: proposed_change
    attributes:
      label: Proposed Change
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: Why is this change necessary? What invariant does it protect?
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Amendment Checklist
      options:
        - label: I have read all existing laws and this does not contradict them
          required: true
        - label: This change improves long-term health of the codebase
          required: true
        - label: I will update LAWS_HASH after merge
          required: true
