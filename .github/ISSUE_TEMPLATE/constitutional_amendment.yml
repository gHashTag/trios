name: Constitutional Amendment
description: Propose a change to LAWS.md per § 8 procedure
title: "[AMEND] ..."
labels: ["constitutional-amendment"]
body:
  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Why this amendment is needed
    validations:
      required: true

  - type: textarea
    id: affected_laws
    attributes:
      label: Affected laws / sections
      description: e.g., L3, L7, §4-I5
    validations:
      required: true

  - type: textarea
    id: migration
    attributes:
      label: Migration notes
      description: What breaks, what agents need to know
    validations:
      required: true

  - type: dropdown
    id: risk_level
    attributes:
      label: Risk statement
      options:
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL
    validations:
      required: true
